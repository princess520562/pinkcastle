<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>城堡美學工作室 - 從成分解析開始，真正了解你的肌膚需求</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-pink': '#DC7292',
                        'brand-light': '#FFF5F5',
                        'brand-accent': '#D4A5A5',
                        'text-main': '#5A4A4A',
                    },
                    fontFamily: {
                        'sans': ['Zen Maru Gothic', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #FFF5F5;
            color: #5A4A4A;
            -webkit-tap-highlight-color: transparent;
        }

        .tab-active {
            color: #DC7292;
            font-weight: 700;
        }

        .tab-active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 25%;
            width: 50%;
            height: 3px;
            background-color: #DC7292;
            border-radius: 99px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(220, 114, 146, 0.1);
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #toast {
            visibility: hidden;
            min-width: 280px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 12px;
            padding: 16px;
            position: fixed;
            z-index: 100;
            left: 50%;
            bottom: 40px;
            transform: translateX(-50%);
        }

        #toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }

        @keyframes fadein { from { bottom: 0; opacity: 0; } to { bottom: 40px; opacity: 1; } }
        @keyframes fadeout { from { bottom: 40px; opacity: 1; } to { bottom: 0; opacity: 0; } }

        input[type="date"] {
            appearance: none;
            -webkit-appearance: none;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans">

    <!-- Hero Header -->
    <header class="bg-white pt-12 pb-8 px-6 text-center border-b border-brand-pink/10">
        <div class="mb-4 inline-block p-4 bg-brand-light rounded-full">
            <svg class="w-12 h-12 text-brand-pink" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
            </svg>
        </div>
        <h1 class="text-3xl font-bold text-brand-pink tracking-tight">城堡美學</h1>
        <p class="mt-2 text-brand-accent text-sm tracking-widest font-medium">從成分解析開始，真正了解你的肌膚需求</p>
        <div class="mt-4 inline-flex items-center px-3 py-1 bg-brand-pink/5 rounded-full text-brand-pink text-xs">
            ✨ 認識肌膚捷徑課 歡迎詢問 ✨
        </div>
    </header>

    <!-- Navigation -->
    <nav class="sticky top-0 z-40 bg-white/90 backdrop-blur-md border-b border-brand-pink/10">
        <div class="max-w-md mx-auto flex justify-around">
            <button onclick="setTab('about')" id="nav-about" class="relative py-4 px-2 text-sm transition-all tab-active">預約須知</button>
            <button onclick="setTab('pricing')" id="nav-pricing" class="relative py-4 px-2 text-sm transition-all">半永久服務項目</button>
            <button onclick="setTab('packages')" id="nav-packages" class="relative py-4 px-2 text-sm transition-all">VIP方案</button>
            <button onclick="setTab('eyebrow')" id="nav-eyebrow" class="relative py-4 px-2 text-sm transition-all">霧眉指南</button>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main id="content" class="flex-grow max-w-2xl mx-auto w-full p-6 pb-24">
        <!-- Content injected by JavaScript -->
    </main>

    <!-- Booking Modal -->
    <div id="bookingModal" class="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 bg-black/40 backdrop-blur-sm hidden">
        <div class="bg-white w-full max-w-md rounded-t-3xl sm:rounded-3xl overflow-hidden shadow-2xl animate-bounce-in">
            <div class="p-6 bg-brand-pink text-white flex justify-between items-center">
                <h3 class="text-xl font-bold">快速預約</h3>
                <button onclick="toggleModal(false)" class="p-2 hover:bg-white/20 rounded-full transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
            <div class="p-6 space-y-5">
                <div>
                    <label class="block text-xs font-bold text-brand-accent mb-2 uppercase tracking-widest">預約項目</label>
                    <div id="selectedServiceDisplay" class="text-lg font-bold text-brand-pink bg-brand-light p-3 rounded-xl border border-brand-pink/10"></div>
                </div>

                <div class="grid grid-cols-1 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-brand-accent mb-2 uppercase tracking-widest">您的稱呼</label>
                        <input type="text" id="bookingName" placeholder="例如：王小明" class="w-full p-4 rounded-xl border-2 border-brand-light bg-brand-light/30 focus:border-brand-pink/30 focus:outline-none text-brand-pink font-medium">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-brand-accent mb-2 uppercase tracking-widest">預約日期</label>
                        <input type="date" id="bookingDate" onchange="updateTimeSlots()" class="w-full p-4 rounded-xl border-2 border-brand-light bg-brand-light/30 focus:border-brand-pink/30 focus:outline-none text-brand-pink font-medium">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-brand-accent mb-2 uppercase tracking-widest">選擇時段</label>
                    <div id="timeSlotContainer" class="grid grid-cols-2 gap-3">
                        <div class="col-span-2 text-center py-4 text-brand-accent/60 text-sm italic">請先選擇日期</div>
                    </div>
                </div>

                <button onclick="handleBooking()" class="w-full py-4 rounded-2xl bg-brand-pink text-white font-bold text-lg shadow-lg shadow-brand-pink/30 active:scale-95 transition-transform">
                    複製訊息並開啟 LINE
                </button>
                <p class="text-[11px] text-center text-brand-accent">* 點擊後將複製格式，請貼上至官方 LINE 對話框</p>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast">已複製預約資訊！</div>

    <!-- Sticky Footer CTA -->
    <div class="fixed bottom-0 left-0 right-0 p-4 bg-white/80 backdrop-blur-md border-t border-brand-pink/10 z-30">
        <div class="max-w-md mx-auto flex gap-3">
            <a href="https://www.instagram.com/pink.castle_" target="_blank" class="flex-1 bg-white border-2 border-brand-pink text-brand-pink py-3 rounded-2xl font-bold text-center flex items-center justify-center gap-2 shadow-sm">
                <span>Instagram</span>
            </a>
            <a href="https://line.me/ti/p/your_line_id" class="flex-[2] bg-brand-pink text-white py-3 rounded-2xl font-bold text-center flex items-center justify-center gap-2 shadow-lg shadow-brand-pink/20">
                <span>官方 LINE 諮詢</span>
            </a>
        </div>
    </div>

    <script>
        const data = {
            about: [
                { title: '🏠 關於工作室', content: '工作室位於社區，3 樓自宅空間，會有家人在家，空間有限請勿攜伴。' },
                { title: '🕒 預約須知', content: '統一使用官方 LINE 預約。預約未保留 10 分鐘，遲到仍同意服務會縮減時間以保障他人權益。' },
                { title: '⚠️ 定金與取消', content: '無故遲到或當日臨時取消，下次預約須付三成定金。取消請至少提前一天告知。' },
                { title: '🧘‍♀️ 身體按摩', content: '身體按摩僅服務女性顧客。每週僅開放 1 位散客名額。' },
                { title: '💰 VIP 方案規則', content: 'VIP 方案目前無使用期限。若因個人因素需要退款，會扣除已使用課程之原價，再進行退款。' },
                { title: '📸 拍攝紀錄', content: '部分課程需配合拍攝紀錄，做為成果比對使用。' }
            ],
            pricing: [
                {
                    category: '美學服務項目',
                    items: [
                        { name: '手工霧眉', price: '4,000', time: '2-3小時 (含四個月內補色一次)' },
                        { name: '薄霧點刺眉', price: '5,000', time: '3-4小時 (含四個月內補色一次)' },
                        { name: '精油睫毛管理', price: '1,200', time: '50分鐘' }
                    ]
                }
            ],
            packages: [
                { name: 'VIP 儲值金', price: '10,000', desc: '臉部、身體全項目 9 折優惠，適合定期保養。' },
                { name: '臉部特殊護理 (10 堂)', price: '15,000', desc: '每堂課價值$1800，購買即贈送一組專屬產品。' },
                { name: '精油按摩 10 堂 ', price: '8,000', desc: '限女性。加贈拔罐/刮痧/滑罐任選一。' }
            ],
            eyebrow: [
                { title: '❌ 不適合預約對象', content: '懷孕/哺乳期、抗凝血藥物使用者、糖尿病、蟹足腫、眉部皮膚病變、高度完美主義者。' },
                { title: '🧴 術前準備', content: '前一週停用酸類，前三天停用美白。當天請勿化妝，避免熬夜。' },
                { title: '🧼 術後清潔', content: '當天可每小時按壓組織液。洗臉不可搓眉毛，碰水後按壓吸乾。' },
                { title: '💧 七天護理', content: '若覺得乾癢，可早晚濕敷 5-10 分鐘，如有需要可塗抹修護膏保持濕潤。' },
                { title: '📅 後續追蹤', content: '一個月至四個月內預約回補。期間自然脫痂，不可人手強行剝除。' }
            ]
        };

        let currentTab = 'about';
        let selectedService = '';
        let selectedTime = '';

        function setTab(tab) {
            currentTab = tab;
            document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('tab-active'));
            document.getElementById(`nav-${tab}`).classList.add('tab-active');
            render();
        }

        function render() {
            const container = document.getElementById('content');
            container.innerHTML = '';
            
            if (currentTab === 'about') {
                data.about.forEach(item => {
                    container.innerHTML += `
                        <div class="glass-card p-5 rounded-2xl mb-4 fade-in">
                            <h3 class="font-bold text-brand-pink mb-2">${item.title}</h3>
                            <p class="text-sm text-text-main leading-relaxed">${item.content}</p>
                        </div>
                    `;
                });
            } else if (currentTab === 'pricing') {
                data.pricing.forEach(cat => {
                    let itemsHtml = cat.items.map(i => `
                        <div class="flex justify-between items-center p-4 border-b border-brand-pink/5 last:border-0">
                            <div>
                                <div class="font-bold text-text-main">${i.name}</div>
                                <div class="text-[11px] text-brand-accent">${i.time}</div>
                            </div>
                            <div class="flex items-center gap-4">
                                <div class="font-bold text-brand-pink">$${i.price}</div>
                                <button onclick="openBooking('${i.name}')" class="bg-brand-pink text-white text-xs px-3 py-2 rounded-lg font-bold active:scale-90 transition-transform">預約</button>
                            </div>
                        </div>
                    `).join('');
                    container.innerHTML += `
                        <div class="glass-card rounded-2xl mb-6 overflow-hidden fade-in">
                            <div class="bg-brand-pink/5 px-4 py-2 text-xs font-bold text-brand-pink border-b border-brand-pink/10">${cat.category}</div>
                            ${itemsHtml}
                        </div>
                    `;
                });

                container.innerHTML += `
                    <a href="https://www.instagram.com/pink.castle_" target="_blank" class="glass-card p-5 rounded-2xl mb-4 border-dashed border-2 border-brand-pink/30 flex items-center justify-between group fade-in">
                        <div>
                            <h3 class="font-bold text-brand-pink mb-1">📋 完整價目表</h3>
                            <p class="text-sm text-text-main leading-relaxed">臉部及身體價目表請至 IG 精選動態查看</p>
                        </div>
                        <div class="text-brand-pink group-hover:translate-x-1 transition-transform">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
                        </div>
                    </a>
                `;
            } else if (currentTab === 'packages') {
                data.packages.forEach(p => {
                    container.innerHTML += `
                        <div class="glass-card p-6 rounded-2xl mb-4 border-l-4 border-l-brand-pink fade-in">
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="font-bold text-lg text-text-main">${p.name}</h3>
                                <span class="bg-brand-pink text-white text-sm font-bold px-3 py-1 rounded-full">$${p.price}</span>
                            </div>
                            <p class="text-sm text-brand-accent leading-relaxed">${p.desc}</p>
                        </div>
                    `;
                });
            } else if (currentTab === 'eyebrow') {
                data.eyebrow.forEach(item => {
                    container.innerHTML += `
                        <div class="glass-card p-5 rounded-2xl mb-4 fade-in">
                            <h3 class="font-bold text-brand-pink mb-2 underline decoration-brand-pink/30 underline-offset-4">${item.title}</h3>
                            <p class="text-sm text-text-main leading-relaxed">${item.content}</p>
                        </div>
                    `;
                });
            }
        }

        function openBooking(service) {
            selectedService = service;
            selectedTime = '';
            document.getElementById('selectedServiceDisplay').innerText = service;
            toggleModal(true);
        }

        function toggleModal(show) {
            const modal = document.getElementById('bookingModal');
            if (show) {
                modal.classList.remove('hidden');
                document.body.style.overflow = 'hidden';
            } else {
                modal.classList.add('hidden');
                document.body.style.overflow = 'auto';
            }
        }

        function updateTimeSlots() {
            const dateInput = document.getElementById('bookingDate').value;
            const container = document.getElementById('timeSlotContainer');
            if (!dateInput) return;

            const date = new Date(dateInput);
            const day = date.getDay();
            const isWeekend = (day === 0 || day === 6);
            
            const slots = isWeekend ? ['09:30', '11:00', '13:30', '15:30'] : ['18:00'];
            
            container.innerHTML = slots.map(s => `
                <button onclick="selectTime('${s}')" class="slot-btn border-2 border-brand-light py-2 rounded-xl text-sm font-medium text-text-main hover:bg-brand-light transition-colors" data-time="${s}">
                    ${s}
                </button>
            `).join('');
            selectedTime = '';
        }

        function selectTime(time) {
            selectedTime = time;
            document.querySelectorAll('.slot-btn').forEach(btn => {
                btn.classList.remove('bg-brand-pink', 'text-white', 'border-brand-pink');
                if (btn.getAttribute('data-time') === time) {
                    btn.classList.add('bg-brand-pink', 'text-white', 'border-brand-pink');
                }
            });
        }

        function handleBooking() {
            const name = document.getElementById('bookingName').value;
            const date = document.getElementById('bookingDate').value;

            if (!name || !date || !selectedTime) {
                alert('請完整填寫姓名、日期與時段');
                return;
            }

            const message = `您好，我想預約課程：\n【預約項目】：${selectedService}\n【姓名】：${name}\n【日期】：${date}\n【時段】：${selectedTime}`;
            
            const el = document.createElement('textarea');
            el.value = message;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);

            showToast();
            
            setTimeout(() => {
                window.location.href = "https://line.me/ti/p/your_line_id";
            }, 1000);
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        window.onload = render;
    </script>
</body>
</html>
